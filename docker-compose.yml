# 로컬 개발용 MySQL + Redis
# 성능 테스트 전 인프라를 빠르게 띄우기 위한 구성
services:
  mysql:
    image: mysql:8.0
    container_name: subsidy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: subsidy_db
    ports:
      - "3307:3306"   # 로컬 MySQL(3306)과 충돌 방지
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: subsidy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
